id: 75897
name: agricola-legumexapps-api
environments:
  production:
    memory: 1024
    cli-memory: 512
    runtime: 'php-8.4:al2'
    build:
      - 'composer install --no-dev --optimize-autoloader'
      - 'php artisan event:cache'
    queues:
      - default
  staging:
    memory: 1024
    cli-memory: 512
    runtime: 'php-8.4:al2'
    build:
      - 'composer install --no-dev --optimize-autoloader'
      - 'php artisan event:cache'
    queues:
      - default
